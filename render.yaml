services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: restaunteur-pro-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false          # set manually in Render dashboard
      - key: DB_NAME
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true

  # ── Frontend (Static Site) ───────────────────────────────────────────────────
  - type: web
    name: restaunteur-pro-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false          # set to your backend Render URL e.g. https://restaunteur-pro-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
