services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: restaunteur-pro-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && ./install_officecli.sh
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/restaunteur.db
      - key: OPENAI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: BACKEND_URL
        sync: false          # e.g., https://restaunteur-pro-api.onrender.com
      - key: FRONTEND_URL
        sync: false          # e.g., https://restaunteur-pro.onrender.com
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
    disk:
      name: restaunteur-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /api/health
    autoDeploy: true

  # ── Frontend (Static Site) ───────────────────────────────────────────────────
  - type: web
    name: restaunteur-pro-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false          # e.g., https://restaunteur-pro-api.onrender.com
      - key: REACT_APP_GOOGLE_CLIENT_ID
        sync: false          # same as backend GOOGLE_CLIENT_ID
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
